[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    integration: tests that exercise the database layer
    contract: tests that validate AI provider/schema contracts
    ollama: tests that require a live local Ollama server (skipped by default)
filterwarnings =
    # Known tech-debt: codebase uses datetime.utcnow() (see REPOSITORY_AUDIT.md §4).
    ignore:datetime.datetime.utcnow:DeprecationWarning
